<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productes | PONPAPERConnect</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    .products-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .cart-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .cart-content {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 2rem;
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .cart-item .thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: hidden;
      margin-right: 12px;
      flex-shrink: 0;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .cart-item-info {
      flex: 1;
    }
    .cart-item-name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .cart-item-price {
      color: #666;
    }
    .cart-item-quantity {
      margin: 0 0.5rem;
      font-weight: 600;
      min-width: 2rem;
      text-align: center;
    }
    .quantity-btn {
      background: #EA5455;
      color: white;
      border: none;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .quantity-btn:hover:not(:disabled) {
      background: #d74344;
    }
    .quantity-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .cart-item-total {
      font-weight: 600;
      color: #EA5455;
      min-width: 4rem;
      text-align: right;
    }
    .remove-item {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }
    .cart-total {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 2px solid #EA5455;
      text-align: right;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .cart-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }
    .btn {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
    }
    .btn-primary {
      background: #EA5455;
      color: white;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }
    .error {
      text-align: center;
      padding: 2rem;
      color: #dc3545;
    }
    .close-cart-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    /* Estils del boto del carret */
    .cart-btn-container {
      display: flex;
      align-items: center;
      position: relative;
    }
    .cart-btn {
      background: rgba(234, 84, 85, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: transform 0.3s, background 0.3s;
      box-shadow: 0 2px 8px rgba(234, 84, 85, 0.3);
      position: relative;
    }
    .cart-btn:hover {
      transform: scale(1.1);
      background: rgba(234, 84, 85, 1);
    }
    #cartBadge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #EA5455;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 0.7rem;
      min-width: 18px;
      text-align: center;
      display: none;
    }
    #cartBadge.has-items {
      display: block;
    }
    /* Estils del formulari de checkout */
    .checkout-form-group {
      margin-bottom: 1rem;
    }
    .checkout-form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .checkout-form-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>


  <header class="site-header">
    <div class="logo">CIPEPONPAPER<span>Connect</span></div>
    <nav class="site-nav">
      <ul>
          <li><a href="../index.html" data-i18n="nav.home">Inici</a></li>
        <li><a href="productos.html" class="active" data-i18n="nav.products">Productes</a></li>
        <li><a href="pedidos.html" data-i18n="nav.myOrders">Les meves comandes</a></li>
          <li><a href="pressupost.html" data-i18n="nav.budget">Pressupost</a></li>
          <li><a href="contacto.html" data-i18n="nav.contact">Contacte</a></li>
          <li><a href="login.html" data-i18n="nav.login">Accedeix / Registra't</a></li>
      </ul>
    </nav>
    <div class="cart-btn-container">
      <button type="button" onclick="toggleCart()" class="btn btn-primary cart-btn">
        🛒
        <span id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <main class="products-page">
    <h1 data-i18n="nav.products">Productes</h1>
    <div id="productsContainer" class="products-grid"></div>
  </main>

  <!-- Modal del carret -->
  <div id="cartModal" class="cart-modal">
    <div class="cart-content">
      <div class="cart-header">
        <h2 data-i18n="cart.title">Carret de compra</h2>
  <button type="button" class="close-cart-btn" onclick="toggleCart()">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div id="cartTotal" class="cart-total" style="display:none;">
        <span data-i18n="cart.total">Total</span>: €<span id="totalAmount">0.00</span>
      </div>
      <div id="cartActions" class="cart-actions" style="display:none;">
        <button type="button" class="btn btn-secondary" data-i18n="cart.close" onclick="toggleCart()">Tanca</button>
        <button type="button" class="btn btn-primary" data-i18n="cart.checkout" onclick="showCheckout()">Finalitza la compra</button>
      </div>
    </div>
  </div>

  <!-- Modal de pagament -->
  <div id="checkoutModal" class="cart-modal" style="display:none;">
    <div class="cart-content">
      <div class="cart-header">
        <h2 data-i18n="checkout.title">Finalitza la compra</h2>
        <button type="button" class="close-cart-btn" onclick="closeCheckout()">&times;</button>
      </div>
      <form id="checkoutForm">
        <div class="checkout-form-group">
          <label class="checkout-form-label" data-i18n="checkout.form.name">Nom complet *</label>
          <input type="text" name="shipping_name" required class="checkout-form-input">
        </div>
        <div class="checkout-form-group">
          <label class="checkout-form-label" data-i18n="checkout.form.address">Adreca *</label>
          <input type="text" name="shipping_address" required class="checkout-form-input">
        </div>
        <div class="checkout-form-group">
          <label class="checkout-form-label" data-i18n="checkout.form.city">Ciutat *</label>
          <input type="text" name="shipping_city" required class="checkout-form-input">
        </div>
        <div class="checkout-form-group">
          <label class="checkout-form-label" data-i18n="checkout.form.postalCode">Codi postal *</label>
          <input type="text" name="shipping_postal_code" required class="checkout-form-input">
        </div>
        <div class="checkout-form-group">
          <label class="checkout-form-label" data-i18n="checkout.form.phone">Telefon</label>
          <input type="tel" name="shipping_phone" class="checkout-form-input">
        </div>
        <div id="checkoutTotal" class="cart-total">
          <span data-i18n="cart.total">Total</span>: €<span id="checkoutTotalAmount">0.00</span>
        </div>
        <div class="cart-actions">
          <button type="button" class="btn btn-secondary" data-i18n="checkout.cancel" onclick="closeCheckout()">Cancel·la</button>
          <button type="submit" class="btn btn-primary" data-i18n="checkout.confirm">Confirma la comanda</button>
        </div>
      </form>
    </div>
  </div>


  <script src="../js/i18n.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const nav = document.querySelector('.site-nav ul');
      
      // Detecta primer la base de l'API
      const override = new URLSearchParams(location.search).get('apiBase');
      let apiBase = '';
      if (override) {
        apiBase = override.replace(/\/+$/, '');
      } else {
        const saved = window.localStorage.getItem('apiBase');
        apiBase = saved ? saved.replace(/\/+$/, '') : 'http://localhost:8080/ponpaper-backend-1.0-SNAPSHOT';
      }
      
      // Verifica la sessio real amb el backend
      try {
        const res = await fetch(`${apiBase}/api/user`, { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          if (data.authenticated && data.user && nav) {
            const loginLink = nav.querySelector('a[href$="login.html"]');
            if (loginLink && loginLink.parentElement) loginLink.parentElement.remove();
            
            const liUser = document.createElement('li');
            liUser.innerHTML = `<span>Hola, ${data.user.name}</span>`;
            
            // Afegeix enllac al panell d'administracio si es ADMIN
            if (data.user.role === 'ADMIN') {
              const liAdmin = document.createElement('li');
              const adminLink = document.createElement('a');
              adminLink.href = 'admin_pedidos.html';
              adminLink.textContent = '📊 Panell Admin';
              adminLink.style.color = '#ea5455';
              adminLink.style.fontWeight = 'bold';
              liAdmin.appendChild(adminLink);
              nav.appendChild(liAdmin);
            }
            
            const liLogout = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = 'Surt';
            a.onclick = function(e) {
              e.preventDefault();
              // Crida l'endpoint de logout
              fetch(`${apiBase}/api/logout`, {
                method: 'POST',
                credentials: 'include'
              }).then(() => {
                // Neteja-ho tot i redirigeix al login
                localStorage.removeItem('username');
                localStorage.removeItem('userId');
                localStorage.removeItem('usuariConnectat');
                document.cookie = 'JSESSIONID=; Path=/; Max-Age=0';
                document.cookie = 'JSESSIONID=; Path=/ponpaper-backend-1.0-SNAPSHOT; Max-Age=0';
                window.location.href = 'login.html';
              }).catch(err => {
                console.warn('Error en tancar sessio:', err);
                // Neteja igualment
                localStorage.removeItem('username');
                localStorage.removeItem('userId');
                localStorage.removeItem('usuariConnectat');
                window.location.href = 'login.html';
              });
            };
            liLogout.appendChild(a);
            nav.appendChild(liUser);
            nav.appendChild(liLogout);
          } else {
            // No autenticat - neteja localStorage residual
            localStorage.removeItem('username');
            localStorage.removeItem('userId');
            localStorage.removeItem('usuariConnectat');
          }
        }
      } catch (e) {
        console.warn('[DEBUG] Session check failed:', e);
        // Neteja localStorage en cas d'error
        localStorage.removeItem('username');
        localStorage.removeItem('userId');
        localStorage.removeItem('usuariConnectat');
      }
    });
  </script>
  <!-- JS personalitzat de la pagina de productes i carret -->
  <script>
    // ...tot el JS de productes i carret aqui...
    let products = [];
    let cartItems = [];
    let basePath = '';
    const LOCAL_PRODUCTS = [
      { id: 1, name: 'Llibreta reciclada', description: 'Llibreta A5 ecologica', material: 'Paper reciclat', price: 8.50, stock: 25, image_url: 'img/producte1.jpg' },
      { id: 2, name: 'Boligraf de bambu', description: 'Boligraf reutilitzable', material: 'Bambu', price: 3.20, stock: 40, image_url: 'img/producte2.jpg' },
      { id: 3, name: 'Carpeta kraft', description: 'Carpeta resistent', material: 'Cartro', price: 5.90, stock: 18, image_url: 'img/producte3.jpg' }
    ];

    async function detectApiBase() {
      if (location.protocol === 'file:') {
        console.log('[DEBUG] file:// detectat, s\'utilitzara cataleg local');
        return '';
      }

      const override = new URLSearchParams(location.search).get('apiBase');
      if (override) {
        try { localStorage.setItem('apiBase', override); } catch(_){ }
        console.log('[DEBUG] Using override API base:', override);
        return override.replace(/\/+$/, '');
      }
      const saved = window.localStorage.getItem('apiBase');
      if (saved) {
        console.log('[DEBUG] Using saved API base:', saved);
        return saved.replace(/\/+$/, '');
      }

      const hostBase = `${location.protocol}//${location.host}`;
      const candidates = [
        `${hostBase}/ponpaper-backend-1.0-SNAPSHOT`,
        `${hostBase}/ponpaper-backend`,
        'http://localhost:8080/ponpaper-backend-1.0-SNAPSHOT',
        'http://localhost:8080/ponpaper-backend',
        hostBase
      ];

      console.log('[DEBUG] Testing API candidates:', candidates);
      for (const base of candidates) {
        try {
          console.log('[DEBUG] Testing:', base);
          const cleanBase = base.replace(/\/+$/, '');
          // Compatibilitat incremental: primer intentem la ruta nova i despres la legacy.
          const res = await fetch(`${cleanBase}/api/products`, { method: 'GET', credentials: 'include' });
          const legacyRes = res.ok ? res : await fetch(`${cleanBase}/productos`, { method: 'GET', credentials: 'include' });
          console.log('[DEBUG] Response for', base, ':', legacyRes.status, legacyRes.statusText);
          if (legacyRes.ok) {
            console.log('[DEBUG] Found working API base:', base);
            return base.replace(/\/+$/, '');
          }
        } catch (e) { 
          console.log('[DEBUG] Error testing', base, ':', e.message);
        }
      }
      console.log('[DEBUG] No working API base found, using fallback:', hostBase);
      return `${hostBase}`;
    }

    // Inicialitza
    document.addEventListener('DOMContentLoaded', async () => {
      basePath = await detectApiBase();
      console.log('[DEBUG] Products page using API base:', basePath);
      await loadProducts();
      await loadCart();
    });

    async function loadProducts() {
      try {
        if (!basePath) {
          products = LOCAL_PRODUCTS;
          renderProducts();
          return;
        }

        console.log('[DEBUG] Loading products from:', `${basePath}/api/products`);
        let response = await fetch(`${basePath}/api/products`, { credentials: 'include' });
        if (!response.ok) {
          // Fallback per al backend legacy.
          response = await fetch(`${basePath}/productos`, { credentials: 'include' });
        }
        console.log('[DEBUG] Products response:', response.status, response.statusText);
        const text = await response.text();
        console.log('[DEBUG] Raw response text:', text);
        const data = JSON.parse(text);
        console.log('[DEBUG] Products data:', data);

        if (Array.isArray(data)) {
          products = data;
          console.log('[DEBUG] Legacy products array loaded:', products.length, 'items');
          renderProducts();
        } else if (data.status === 'ok' && Array.isArray(data.products)) {
          products = data.products;
          console.log('[DEBUG] Products loaded:', products.length, 'items');
          renderProducts();
        } else {
          console.log('[DEBUG] Error in products response:', data.message);
          products = LOCAL_PRODUCTS;
          renderProducts();
        }
      } catch (error) {
        console.log('[DEBUG] Error loading products:', error);
        products = LOCAL_PRODUCTS;
        renderProducts();
      }
    }

    function renderProducts() {
      console.log('[DEBUG] Rendering products:', products.length, 'items');
      const container = document.getElementById('productsContainer');
      
      if (products.length === 0) {
        console.log('[DEBUG] No products to render');
        container.innerHTML = `<div class="error">${(window.i18n && window.i18n.t('products.emptyList')) || 'No hi ha productes disponibles'}</div>`;
        return;
      }

      console.log('[DEBUG] Creating product cards for:', products.map(p => p.name));
      console.log('[DEBUG] Image URLs:', products.map(p => `../${p.image_url}`));
      container.innerHTML = products.map(product => {
        const imgPath = product.image_url.startsWith('img/') ? `../${product.image_url}` : product.image_url;
        console.log('[DEBUG] Product:', product.name, 'Image path:', imgPath);
        return `
        <div class="product-card">
          <div class="product-image">
            <img src="${imgPath}" alt="${product.name}" onerror="console.error('Image load error:', this.src); this.src='../img/producte1.jpg'">
          </div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-description">${product.description}</div>
            <div class="product-material">${(window.i18n && window.i18n.t('products.materialLabel', {material: product.material})) || ('Material: ' + product.material)}</div>
            <div class="product-price">€${product.price.toFixed(2)}</div>
            <div class="product-stock ${getStockClass(product.stock)}">
              ${getStockText(product.stock)}
            </div>
            <div style="display: flex; align-items: center; margin-bottom: 1rem;">
              <input type="number" class="quantity-input" id="qty-${product.id}" 
                     value="1" min="1" max="${product.stock}">
              <button class="add-to-cart" onclick="addToCart(${product.id})" 
                      ${product.stock === 0 ? 'disabled' : ''}>
                ${(window.i18n && window.i18n.t('cart.addToCart')) || 'Afegeix al carret'}
              </button>
            </div>
          </div>
        </div>
      `;
      }).join('');
      console.log('[DEBUG] Product cards rendered');
    }

    function getStockClass(stock) {
      if (stock === 0) return 'out-of-stock';
      if (stock <= 5) return 'low-stock';
      return 'in-stock';
    }

    function getStockText(stock) {
  if (stock === 0) return (window.i18n && window.i18n.t('products.stock.out')) || 'Sense estoc';
  if (stock <= 5) return (window.i18n && window.i18n.t('products.stock.low', {count: stock})) || `Poques unitats (${stock})`;
  return (window.i18n && window.i18n.t('products.stock.in', {count: stock})) || `En estoc (${stock})`;
    }

    async function addToCart(productId) {
      const quantityInput = document.getElementById(`qty-${productId}`);
      const quantity = parseInt(quantityInput.value) || 1;
      
      console.log('[DEBUG] addToCart called - productId:', productId, 'quantity:', quantity, 'basePath:', basePath);

      try {
        const response = await fetch(`${basePath}/api/cart`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          credentials: 'include',
          body: new URLSearchParams({
            product_id: productId,
            quantity: quantity
          })
        });

        console.log('[DEBUG] addToCart response status:', response.status);
        const data = await response.json();
        console.log('[DEBUG] addToCart response data:', data);
        
        if (data.status === 'ok') {
          // Mostra missatge d'exit
          showMessage((window.i18n && window.i18n.t('cart.addSuccess')) || 'Producte afegit al carret', 'success');
          await loadCart(); // Torna a carregar el carret
        } else {
          showMessage(data.message || (window.i18n && window.i18n.t('cart.addError')) || 'Error en afegir al carret', 'error');
        }
      } catch (error) {
        console.error('[DEBUG] addToCart error:', error);
        showMessage((window.i18n && window.i18n.t('cart.addError')) || 'Error en afegir al carret', 'error');
      }
    }

    async function loadCart() {
      if (!basePath) {
        cartItems = [];
        updateCartBadge();
        renderCart();
        return;
      }

      try {
        const response = await fetch(`${basePath}/api/cart`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (data.status === 'ok') {
          cartItems = data.items;
          updateCartBadge();
          renderCart();
        } else {
          cartItems = [];
          updateCartBadge();
          document.getElementById('cartItems').innerHTML = 
            `<div class="error">${(window.i18n && window.i18n.t('cart.loginRequired')) || 'Has d\'iniciar sessio per utilitzar el carret'}</div>`;
        }
      } catch (error) {
        console.error('Error loading cart:', error);
      }
    }

    function updateCartBadge() {
      const badge = document.getElementById('cartBadge');
      const totalItems = cartItems.reduce((sum, item) => sum + item.quantity, 0);
      
      if (totalItems > 0) {
        badge.textContent = totalItems;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const totalDiv = document.getElementById('cartTotal');
      const actionsDiv = document.getElementById('cartActions');
      
      if (cartItems.length === 0) {
        container.innerHTML = `<div class=\"error\">${(window.i18n && window.i18n.t('cart.empty')) || 'El carret es buit'}</div>`;
        totalDiv.style.display = 'none';
        actionsDiv.style.display = 'none';
        return;
      }

      container.innerHTML = cartItems.map(item => {
        // Obte l'estoc disponible del producte
        const product = products.find(p => p.id === item.product_id);
        const maxStock = product ? product.stock : item.quantity;
        const canIncrease = item.quantity < maxStock;
        
        return `
        <div class="cart-item">
          <div class="thumb">
            
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">€${item.price.toFixed(2)} c/u</div>
            ${!canIncrease ? `<div style=\"color: #EA5455; font-size: 0.8rem;\">${(window.i18n && window.i18n.t('cart.stockMaxReached')) || 'S\'ha assolit l\'estoc maxim'}</div>` : ''}
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <button class="quantity-btn" onclick="updateQuantity(${item.product_id}, ${item.quantity - 1}, ${maxStock})" 
                    ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
            <div class="cart-item-quantity">${item.quantity}</div>
            <button class="quantity-btn" onclick="updateQuantity(${item.product_id}, ${item.quantity + 1}, ${maxStock})" 
                    ${!canIncrease ? 'disabled' : ''}>+</button>
          </div>
          <div class="cart-item-total">€${item.item_total.toFixed(2)}</div>
          <button class="remove-item" onclick="removeFromCart(${item.id})">🗑️</button>
        </div>
      `;
      }).join('');

      const total = cartItems.reduce((sum, item) => sum + item.item_total, 0);
      document.getElementById('totalAmount').textContent = total.toFixed(2);
      totalDiv.style.display = 'block';
      actionsDiv.style.display = 'flex';
    }

    async function updateQuantity(productId, newQuantity, maxStock) {
      // Valida quantitat minima
      if (newQuantity < 1) {
        showMessage((window.i18n && window.i18n.t('cart.minQuantityError')) || 'La quantitat minima es 1', 'error');
        return;
      }
      
      // Valida estoc maxim
      if (newQuantity > maxStock) {
        showMessage((window.i18n && window.i18n.t('cart.maxStockError', {count: maxStock})) || `Estoc maxim disponible: ${maxStock} unitats`, 'error');
        return;
      }
      
      try {
        const params = new URLSearchParams();
        params.append('product_id', productId);
        params.append('quantity', newQuantity);
        const response = await fetch(`${basePath}/api/cart`, {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
        const data = await response.json();
        if (data.status === 'ok') {
          await loadCart();
        } else {
          showMessage(data.message || (window.i18n && window.i18n.t('cart.updateError')) || 'Error en actualitzar la quantitat', 'error');
        }
      } catch (error) {
        showMessage((window.i18n && window.i18n.t('cart.updateError')) || 'Error en actualitzar la quantitat', 'error');
      }
    }

    async function removeFromCart(cartItemId) {
      try {
        const response = await fetch(`${basePath}/api/cart?cart_item_id=${cartItemId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        const data = await response.json();
        
        if (data.status === 'ok') {
          showMessage((window.i18n && window.i18n.t('cart.removeSuccess')) || 'Producte eliminat del carret', 'success');
          await loadCart();
        } else {
          showMessage(data.message || (window.i18n && window.i18n.t('cart.removeError')) || 'Error en eliminar del carret', 'error');
        }
      } catch (error) {
        showMessage((window.i18n && window.i18n.t('cart.removeError')) || 'Error en eliminar del carret', 'error');
      }
    }

    function toggleCart() {
      const modal = document.getElementById('cartModal');
      modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function showCheckout() {
      const total = cartItems.reduce((sum, item) => sum + item.item_total, 0);
      document.getElementById('checkoutTotalAmount').textContent = total.toFixed(2);
      document.getElementById('cartModal').style.display = 'none';
      document.getElementById('checkoutModal').style.display = 'flex';
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').style.display = 'none';
    }

    async function processCheckout(e) {
      e.preventDefault();
      console.log('[DEBUG] Processant checkout, basePath:', basePath);
      
      const formData = new FormData(e.target);
      const params = new URLSearchParams(formData);
      
      console.log('[DEBUG] Checkout params:', Array.from(params.entries()));

      try {
        const response = await fetch(`${basePath}/api/checkout`, {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          credentials: 'include',
          body: params
        });

        console.log('[DEBUG] Checkout response status:', response.status);
        const data = await response.json();
        console.log('[DEBUG] Checkout response data:', data);

        if (data.status === 'ok') {
          closeCheckout();
          const okMsg = (window.i18n && window.i18n.t('checkout.success', {order_id: data.order_id, total: data.total.toFixed(2)})) || `Comanda #${data.order_id} feta amb exit! Total: €${data.total.toFixed(2)}`;
          showMessage(okMsg, 'success');
          await loadCart(); // Torna a carregar el carret buit
          e.target.reset();
        } else {
          showMessage(data.message || (window.i18n && window.i18n.t('checkout.error')) || 'Error en processar la comanda', 'error');
        }
      } catch (error) {
        console.error('[DEBUG] Checkout error:', error);
        showMessage((window.i18n && window.i18n.t('checkout.error')) || 'Error en processar la comanda', 'error');
      }
    }

    // Gestiona l'enviament del formulari de checkout
    document.addEventListener('DOMContentLoaded', () => {
      const checkoutForm = document.getElementById('checkoutForm');
      if (checkoutForm) {
        checkoutForm.onsubmit = processCheckout;
      }
    });

    function showMessage(message, type) {
      // Crea element temporal de missatge
      const messageDiv = document.createElement('div');
      messageDiv.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 1rem 2rem;
        border-radius: 6px;
        color: white;
        font-weight: 600;
        z-index: 3000;
        transition: opacity 0.3s;
      `;
      
      switch(type) {
        case 'success':
          messageDiv.style.background = '#28a745';
          break;
        case 'error':
          messageDiv.style.background = '#dc3545';
          break;
        case 'info':
          messageDiv.style.background = '#17a2b8';
          break;
      }
      
      messageDiv.textContent = message;
      document.body.appendChild(messageDiv);
      
      setTimeout(() => {
        messageDiv.style.opacity = '0';
        setTimeout(() => document.body.removeChild(messageDiv), 300);
      }, 3000);
    }
  </script>

</body>
</html>
