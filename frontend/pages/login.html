<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sessió | PONPAPERConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/logo.png">
  </head>
  <body>
    <header class="site-header">
      <div class="logo">CIPEPONPAPER<span>Connect</span></div>
      <nav class="site-nav">
        <ul>
          <li><a href="../index.html">Inici</a></li>
          <li><a href="login.html" class="active">Inicia sessió / Registre</a></li>
        </ul>
      </nav>
      <div class="user-area">
        <a href="login.html" id="user-name">Inicia sessió</a>
        <button type="button" id="logout-btn-header" style="display: none">TANCA SESSIÓ</button>
      </div>
    </header>

    <main class="auth-page">
      <h1>Accedeix o registra't</h1>

      <section class="auth-forms">
        <div class="form-box" id="register">
          <h2>Registra't</h2>
          <form id="registerForm">
            <input type="text" name="username" placeholder="Usuari" required>
            <input type="email" name="email" placeholder="Correu electrònic" required>
            <input type="password" name="password" placeholder="Contrasenya" autocomplete="new-password" required>
            <button type="submit">Crea un compte</button>
          </form>
        </div>

        <div class="form-box">
          <h2>Inicia sessió</h2>
          <form id="loginForm">
            <input type="text" name="username" placeholder="Usuari o correu" required>
            <input type="password" name="password" placeholder="Contrasenya" autocomplete="current-password" required>
            <button type="submit">Entra</button>
          </form>
        </div>
      </section>

      <div id="msg"></div>
    </main>

    <footer class="site-footer">
      <p>&copy; 2025 PONPAPERConnect | Demo de registre/login sense backend</p>
    </footer>

    <script>
      class AuthService {
        constructor(usersKey = "users", currentUserKey = "username") {
          this.usersKey = usersKey;
          this.currentUserKey = currentUserKey;
        }

        getUsers() {
          try {
            return JSON.parse(localStorage.getItem(this.usersKey) || "[]");
          } catch {
            return [];
          }
        }

        saveUsers(users) {
          localStorage.setItem(this.usersKey, JSON.stringify(users));
        }

        register(username, email, password) {
          const users = this.getUsers();

          if (users.some((u) => u.email === email)) {
            return { ok: false, message: "Aquest correu ja està registrat." };
          }

          users.push({ username, email, password });
          this.saveUsers(users);
          this.setCurrentUser(username);

          return { ok: true, message: "Usuari registrat correctament." };
        }

        login(userOrEmail, password) {
        const users = this.getUsers();
        const found = users.find(
            (u) =>
            (u.username === userOrEmail || u.email === userOrEmail) &&
            u.password === password
        );

        if (!found) {
            return { ok: false, message: "Usuari o contrasenya incorrectes." };
        }

        this.setCurrentUser(found.username);
        return { ok: true, message: "Inici de sessió correcte." };
        }

        setCurrentUser(username) {
        localStorage.setItem(this.currentUserKey, username);
        }

        getCurrentUser() {
        return localStorage.getItem(this.currentUserKey);
        }

        logout() {
        localStorage.removeItem(this.currentUserKey);
        }
    }

    const msg = document.getElementById("msg");
    const auth = new AuthService();

    function getPostAuthRedirect() {
      const fallback = "../index.html";
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get("returnTo");
      const saved = localStorage.getItem("lastVisitedPage");
      const candidate = returnTo || saved;

      if (!candidate) return fallback;

      try {
        const url = new URL(candidate, window.location.origin);
        const path = url.pathname.toLowerCase();
        if (path.endsWith("/pages/login.html") || path.endsWith("/pages/private.html")) {
          return fallback;
        }
        return `${url.pathname}${url.search}${url.hash}`;
      } catch {
        return fallback;
      }
    }

    document.getElementById("registerForm").onsubmit = (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const username = (form.get("username") || "").trim();
        const email = (form.get("email") || "").trim();
        const password = (form.get("password") || "").trim();

        if (!username || !email || !password) {
          msg.style.color = "#EA5455";
          msg.textContent = "Tots els camps són obligatoris.";
          return;
        }
        if (!email.includes("@")) {
          msg.style.color = "#EA5455";
          msg.textContent = "El correu no és vàlid.";
          return;
        }

        const result = auth.register(username, email, password);

        msg.style.color = result.ok ? "green" : "#EA5455";
        msg.textContent = result.message;

        if (result.ok) {
          window.location.href = getPostAuthRedirect();
        }
      };

      document.getElementById("loginForm").onsubmit = (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const userOrEmail = (form.get("username") || "").trim();
        const password = (form.get("password") || "").trim();

        const result = auth.login(userOrEmail, password);

        msg.style.color = result.ok ? "green" : "#EA5455";
        msg.textContent = result.message;

        if (result.ok) {
          window.location.href = getPostAuthRedirect();
        }
      };
    </script>
    <script src="../js/main.js"></script>
  </body>
</html>
