<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productes | PONPAPERConnect</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/productes.css">
  <link rel="icon" href="../img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="logo">CIPEPONPAPER<span>Connect</span></div>
    <nav class="site-nav">
      <ul>
          <li><a href="../index.html" data-i18n="nav.home">Inici</a></li>
        <li><a href="productes.html" class="active" data-i18n="nav.products">Productes</a></li>
        <li><a href="comandes.html" data-i18n="nav.myOrders">Les meves comandes</a></li>
          <li><a href="pressupost.html" data-i18n="nav.budget">Pressupost</a></li>
          <li><a href="contacte.html" data-i18n="nav.contact">Contacte</a></li>
          <li><a href="login.html" data-i18n="nav.login">Accedeix / Registra't</a></li>
      </ul>
    </nav>
    <div class="cart-btn-container">
      <button type="button" id="openCartBtn" class="btn btn-primary cart-btn">
        🛒
        <span id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <main class="products-page">
    <h1 data-i18n="nav.products">Productes</h1>
    <div id="productsStatus" class="status-box loading">Carregant productes...</div>
    <div id="productsContainer" class="products-grid"></div>
  </main>

  <!-- Modal del carret -->
  <div id="cartModal" class="cart-modal">
    <div class="cart-content">
      <div class="cart-header">
        <h2 data-i18n="cart.title">Carret de compra</h2>
        <button type="button" class="close-cart-btn" id="closeCartBtn">&times;</button>
      </div>
      <div id="cartStatus" class="status-box" style="display:none;"></div>
      <div id="cartItems"></div>
      <div id="cartTotal" class="cart-total" style="display:none;">
        <span data-i18n="cart.total">Total</span>: €<span id="totalAmount">0.00</span>
      </div>
      <div id="cartActions" class="cart-actions" style="display:none;">
        <button type="button" class="btn btn-secondary" id="closeCartActionBtn" data-i18n="cart.close">Tanca</button>
        <button type="button" class="btn btn-primary" id="openCheckoutBtn" data-i18n="cart.checkout">Finalitza la compra</button>
      </div>
    </div>
  </div>

  <div id="checkoutModal" class="cart-modal" style="display:none;">
    <div class="cart-content">
      <div class="cart-header">
        <h2>Finalitzar compra</h2>
        <button type="button" class="close-cart-btn" id="closeCheckoutBtn">&times;</button>
      </div>
      <div id="checkoutStatus" class="status-box" style="display:none;"></div>
      <form id="checkoutForm" class="checkout-form">
        <div class="checkout-grid">
          <label>
            Nom i cognoms*
            <input type="text" name="customer_name" required maxlength="120" autocomplete="name">
          </label>
          <label>
            Email*
            <input type="email" name="email" required maxlength="120" autocomplete="email">
          </label>
          <label>
            Telefon*
            <input type="tel" name="phone" required maxlength="30" autocomplete="tel">
          </label>
          <label>
            Adreca*
            <input type="text" name="address" required maxlength="160" autocomplete="address-line1">
          </label>
          <label>
            Ciutat*
            <input type="text" name="city" required maxlength="100" autocomplete="address-level2">
          </label>
          <label>
            Codi postal*
            <input type="text" name="postal_code" required maxlength="12" autocomplete="postal-code">
          </label>
          <label>
            Metode de pagament
            <select name="payment_method">
              <option value="targeta">Targeta</option>
              <option value="bizum">Bizum</option>
              <option value="transferencia">Transferencia</option>
            </select>
          </label>
          <label class="checkout-full-width">
            Notes de lliurament
            <textarea name="notes" rows="3" maxlength="300" placeholder="Ex.: Trucar abans d'entregar"></textarea>
          </label>
        </div>

        <div class="cart-total" id="checkoutBreakdown">
          <div><span data-i18n="checkout.subtotal">Subtotal</span>: €<span id="checkoutSubtotalAmount">0.00</span></div>
          <div><span data-i18n="checkout.vat">IVA 21%</span>: €<span id="checkoutVatAmount">0.00</span></div>
          <div><strong data-i18n="checkout.total">Total final</strong>: €<span id="checkoutTotalAmount">0.00</span></div>
        </div>

        <div class="cart-actions">
          <button type="button" class="btn btn-secondary" id="closeCheckoutActionBtn">Tanca</button>
          <button type="submit" class="btn btn-primary" id="placeOrderBtn">Confirmar comanda</button>
        </div>
      </form>
    </div>
  </div>


  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
  <script type="module" src="../js/productes-page.js"></script>
</body>
</html>
